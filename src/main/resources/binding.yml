# ItemLock 绑定行为规则。
# 本文件控制哪些物品会在哪些动作后完成灵魂绑定。
# config.yml 仍负责全局开关、卷轴物品、保护行为和音效配置。

auto-bind:
  # 仅在 config.yml 的 binding.automatic 为 true 时用于自动标记待绑定物品。
  default-types:
    - WEAPONS
    - ARMOR
    - TOOLS
  explicit-materials: []
  excluded-materials: []

actions:
  # 破坏方块后完成绑定的物品规则。
  block-break:
    types:
      - PICKAXES
      - AXES
      - SHOVELS
      - HOES
      - SHEARS
    materials: []
    excluded-materials: []

  # 实际穿戴到装备槽后完成绑定的物品规则。
  armor-equip:
    types:
      - ARMOR
      - ELYTRA
      - SHIELD
    materials: []
    excluded-materials: []

  # 击杀实体后完成绑定的物品规则。
  kill:
    types:
      - WEAPONS
    materials: []
    excluded-materials: []

  # 直接使用、右键、放置或类似交互后完成绑定的物品规则。
  interact:
    types:
      - INTERACT_TOOLS
      - MISC_ITEMS
    materials: []
    excluded-materials: []
